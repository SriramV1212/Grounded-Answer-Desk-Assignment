name: Deploy to Droplet

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --frozen

      - name: Write .env from secrets
        run: |
          cat > .env <<EOF
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          OPENCLAW_GATEWAY_TOKEN=${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          OPENCLAW_GATEWAY_URL=http://localhost:18789
          OPENCLAW_AGENT_ID=main
          QDRANT_URL=http://localhost:6333
          QDRANT_COLLECTION=anthropic_docs
          MCP_SERVER_URL=http://localhost:8001
          ALLOWED_ORIGINS=http://localhost:3000,https://grounded-answer-desk-frontend.vercel.app
          EOF
          chmod 600 .env

      - name: Start Qdrant
        run: docker compose -f infra/docker-compose.yml up -d

      - name: Update OpenClaw
        run: docker compose -f /opt/openclaw/docker-compose.yml up -d openclaw-gateway

      - name: Restart MCP server
        run: sudo systemctl restart mcp-server

      - name: Restart server
        run: sudo systemctl restart fastapi